name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on:
      group: databrickslabs-protected-runner-group
      labels: linux-ubuntu-latest
    environment: release
    permissions:
      # Used to authenticate to PyPI via OIDC and sign the release's artifacts with sigstore-python.
      id-token: write
      # Used to attach signing artifacts to the published release.
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          cache: 'pip'
          cache-dependency-path: '**/pyproject.toml'
          python-version: '3.10'

      - name: Build wheels
        run: |
          # see here for more details https://github.com/pypa/hatch/issues/2193
          pip install hatch==1.14.2 "virtualenv<21"
          hatch build

      - name: Draft release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/databricks_*.whl
            dist/databricks_*.tar.gz

      - uses: pypa/gh-action-pypi-publish@release/v1
        name: Publish package distributions to PyPI

      - name: Sign artifacts with Sigstore
        uses: sigstore/gh-action-sigstore-python@v3.2.0
        with:
          inputs: |
            dist/databricks_*.whl
            dist/databricks_*.tar.gz
          release-signing-artifacts: true
